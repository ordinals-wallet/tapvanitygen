name: release

# Builds the cross-platform wgpu miner binaries on tag push and attaches them
# to a GitHub Release. The macOS job additionally builds the native Metal
# miner (fastest on Apple Silicon).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-wgpu:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: tapvanity-wgpu-windows-x86_64.exe
            bin: tapvanity-wgpu.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: tapvanity-wgpu-linux-x86_64
            bin: tapvanity-wgpu
          - os: macos-latest
            target: aarch64-apple-darwin
            name: tapvanity-wgpu-macos-aarch64
            bin: tapvanity-wgpu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build wgpu miner
        working-directory: wgpu
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "wgpu/target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  build-metal:
    # Native Apple Silicon Metal miner (Swift + .metal). macOS runners only.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build metal miner
        working-directory: metal
        run: make
      - name: Stage binary
        run: |
          mkdir -p dist
          cp metal/build/tapvanity_metal dist/tapvanity-metal-macos-aarch64
          cp metal/build/default.metallib dist/default.metallib
      - uses: actions/upload-artifact@v4
        with:
          name: tapvanity-metal-macos-aarch64
          path: dist/*

  release:
    needs: [build-wgpu, build-metal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
